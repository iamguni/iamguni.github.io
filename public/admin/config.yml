# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: iamguni/iamguni.github.io
  branch: main

site_url: https://iamguni.in

media_folder: /public/uploads
public_folder: /uploads

singletons:
  - name: site-settings
    label: Site Settings
    icon: settings
    file: /src/data/site.json
    fields:
      - name: siteLogo
        label: Site Logo
        widget: image

      - name: siteTitle
        label: Site Title
        widget: string

      - name: subtitle
        label: Subtitle
        widget: string

      - name: ownerPhoto
        label: Owner Photo
        widget: image

      - name: cv
        label: CV
        widget: file

      - name: favicon
        label: Favicon
        widget: image

      - name: websiteUrl
        label: Website URL
        widget: string
        hint: Enter the complete website URL, including https://

      - name: social
        label: Social Profiles
        widget: object
        fields:
          - name: facebook
            label: Facebook Username
            widget: string

          - name: twitter
            label: X / Twitter Username
            widget: string

          - name: youtube
            label: YouTube Username
            widget: string

          - name: instagram
            label: Instagram Username
            widget: string

          - name: linkedin
            label: LinkedIn Username
            widget: string

      - name: googleMapsUrl
        label: Google Maps Link
        widget: string

      - name: poetryBlogUrl
        label: Poetry Blog Link
        widget: string

      - name: otherLinks
        label: Other Links
        widget: list
        label_singular: Other Link
        fields:
          - name: label
            label: Link Name
            widget: string
          - name: url
            label: Link URL
            widget: string

      - name: pageContent
        label: Page Content
        widget: richtext
        hint: Main editable page content. Formatting is preserved on the website.
